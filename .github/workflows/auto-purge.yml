name: Auto-Purge Boutiques < 80%

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-purge
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://v35-build-api.ernestpedanou.workers.dev/api/cron/auto-purge" \
            -H "Authorization: Bearer c0e1ef644e74252419e56e7818885cbeaf7bd35bec04b0dfda954678e4f16354" \
            -H "Content-Type: application/json")
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP $CODE — $BODY"
          if [ "$CODE" != "200" ]; then exit 1; fi
