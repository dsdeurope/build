<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>V35 Build — Domaines Expirés</title>
<link rel="stylesheet" href="/assets/platform.css">
<style>
.ed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:14px}
.ed-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;transition:border-color .2s}
.ed-card:hover{border-color:var(--accent)}
.ed-domain{font-size:15px;font-weight:700;margin-bottom:8px}
.ed-domain a{color:var(--fg);text-decoration:none}
.ed-domain a:hover{color:var(--accent)}
.score-bar{height:5px;background:var(--border);border-radius:3px;margin:6px 0;overflow:hidden}
.score-fill{height:100%;border-radius:3px;background:var(--accent)}
.ed-meta{font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px;margin:6px 0}
.ed-price{font-size:14px;font-weight:700}
.card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.overview-bar{display:flex;gap:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.ov-val{font-size:20px;font-weight:700;display:block;line-height:1.2}
.ov-label{font-size:10px;color:var(--muted);text-transform:uppercase}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1}
.niche-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;color:#fff}
.tld-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
</style>
</head>
<body>
<div id="toasts"></div>
<div class="layout">
  <aside id="sidebar"></aside>
  <div class="main">
    <header class="topbar">
      <span id="topbar-title">Domaines Expirés</span>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openModal('modal-agent')">▶ Lancer l'agent</button>
      </div>
    </header>
    <div class="content">

      <!-- Stats -->
      <div class="overview-bar" id="overview"></div>

      <!-- Filters -->
      <div class="toolbar">
        <select class="filter-select" id="f-niche" onchange="applyFilters()">
          <option value="">Toutes niches</option>
          <option>bijoux</option><option>mode</option><option>beaute</option><option>sport</option>
          <option>maison</option><option>electronique</option><option>nutrition</option>
          <option>animaux</option><option>sante</option><option>luxe</option>
        </select>
        <select class="filter-select" id="f-tld" onchange="applyFilters()">
          <option value="">Tous TLD</option>
          <option value="fr">.fr</option><option value="com">.com</option>
          <option value="net">.net</option><option value="shop">.shop</option>
        </select>
        <input type="number" class="filter-input" placeholder="Prix max €" id="f-price" style="width:100px" oninput="applyFilters()">
        <select class="filter-select" id="f-sort" onchange="applyFilters()">
          <option value="score">Score ↓</option>
          <option value="price">Prix ↑</option>
          <option value="alpha">A-Z</option>
        </select>
        <span class="text-muted" id="count-label"></span>
        <button class="btn btn-sm" onclick="load()">↺</button>
      </div>

      <div class="ed-grid" id="ed-grid">
        <div class="empty-state">Chargement…</div>
      </div>
    </div>
  </div>
</div>

<!-- Modal agent -->
<div class="modal" id="modal-agent">
  <div class="modal-box">
    <div class="modal-header"><span>▶ Agent domaines expirés</span><button class="modal-close" onclick="closeModal('modal-agent')">✕</button></div>
    <div class="modal-body">
      <p class="text-muted" style="font-size:13px">Exécutez dans un terminal :</p>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:monospace;font-size:13px;position:relative">
        <span id="agent-cmd">python3 /tmp/expired_domains.py</span>
        <button class="btn btn-sm" style="position:absolute;right:6px;top:6px" onclick="navigator.clipboard.writeText(document.getElementById('agent-cmd').textContent).then(()=>toast('Copié !','success'))">📋</button>
      </div>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeModal('modal-agent')">Fermer</button></div>
  </div>
</div>

<!-- Modal lier boutique -->
<div class="modal" id="modal-link">
  <div class="modal-box">
    <div class="modal-header"><span>🔗 Lier à une boutique</span><button class="modal-close" onclick="closeModal('modal-link')">✕</button></div>
    <div class="modal-body">
      <p id="link-domain-label" class="text-muted" style="font-size:12px;margin-bottom:10px"></p>
      <select id="boutique-select" class="form-input"></select>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-link')">Annuler</button>
      <button class="btn btn-primary" onclick="confirmLink()">Confirmer</button>
    </div>
  </div>
</div>

<script type="module">
import { checkAuth, buildNav, apiGet, apiPut, apiDelete, toast, openModal, closeModal } from '/assets/platform.js';
checkAuth(); buildNav();
window.openModal = openModal; window.closeModal = closeModal;

const NICHE_COLORS = {bijoux:'#f59e0b',mode:'#8b5cf6',beaute:'#ec4899',sport:'#22c55e',maison:'#3b82f6',electronique:'#6366f1',nutrition:'#f97316',animaux:'#14b8a6',sante:'#06b6d4',luxe:'#a78bfa'};
const TLD_COLORS  = {'.fr':'#16a34a','.com':'#2563eb','.net':'#7c3aed','.shop':'#db2777'};

function esc(s) { const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }

let _all = [], _pending = { id:null, domain:null };

async function load() {
  try {
    const res = await apiGet('/expired-domains', { per: 2000 });
    _all = res.list || [];
    renderOverview();
    applyFilters();
  } catch(e) { toast(e.message, 'error'); }
}

function renderOverview() {
  const counts = {};
  _all.forEach(d => { counts[d.niche] = (counts[d.niche]||0)+1; });
  const prices = _all.filter(d=>d.price_eur).map(d=>d.price_eur);
  const avgP = prices.length ? Math.round(prices.reduce((a,b)=>a+b,0)/prices.length) : 0;

  document.getElementById('overview').innerHTML =
    `<div style="text-align:center;min-width:60px"><span class="ov-val">${_all.length}</span><span class="ov-label">Total</span></div>` +
    Object.entries(counts).map(([n,c])=>`<div style="text-align:center;min-width:50px"><span class="ov-val" style="color:${NICHE_COLORS[n]}">${c}</span><span class="ov-label">${n}</span></div>`).join('') +
    `<div style="text-align:center;min-width:60px;margin-left:auto"><span class="ov-val">${avgP?avgP+'€':'—'}</span><span class="ov-label">Prix moy.</span></div>`;
}

window.applyFilters = function() {
  const niche  = document.getElementById('f-niche').value;
  const tld    = document.getElementById('f-tld').value;
  const maxP   = +document.getElementById('f-price').value || 0;
  const sort   = document.getElementById('f-sort').value;

  let d = [..._all];
  if (niche) d = d.filter(x => x.niche === niche);
  if (tld)   d = d.filter(x => x.domain.endsWith('.'+tld));
  if (maxP)  d = d.filter(x => !x.price_eur || x.price_eur <= maxP);
  if (sort === 'score') d.sort((a,b)=>(b.score||0)-(a.score||0));
  else if (sort === 'price') d.sort((a,b)=>(a.price_eur||999)-(b.price_eur||999));
  else if (sort === 'alpha') d.sort((a,b)=>a.domain.localeCompare(b.domain));

  document.getElementById('count-label').textContent = `${d.length} domaine(s)`;
  const grid = document.getElementById('ed-grid');
  if (!d.length) { grid.innerHTML = '<div class="empty-state">Aucun domaine.<br>Lancez l\'agent pour en récupérer.</div>'; return; }
  grid.innerHTML = d.map(cardHTML).join('');
};

function cardHTML(d) {
  const tld   = '.' + d.domain.split('.').pop();
  const price = d.price_eur ? d.price_eur + '€/an' : '—';
  const tldColor  = TLD_COLORS[tld] || '#6b7280';
  const nicheColor = NICHE_COLORS[d.niche] || '#6b7280';
  const kw = (d.keywords||[]).join(', ');
  const linked = d.linked_boutique_domain
    ? `<div style="font-size:10px;color:#22c55e;margin-top:4px">→ ${esc(d.linked_boutique_domain)}</div>` : '';
  return `<div class="ed-card">
    <div class="ed-domain"><a href="https://whois.domaintools.com/${esc(d.domain)}" target="_blank" rel="noopener">${esc(d.domain)}</a></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">
      <span class="tld-badge" style="background:${tldColor};color:#fff">${esc(tld)}</span>
      <span class="niche-badge" style="background:${nicheColor}">${esc(d.niche)}</span>
      <span class="badge ${d.status==='available'?'badge-success':'badge-warn'}" style="font-size:10px">${esc(d.status||'?')}</span>
    </div>
    <div style="font-size:11px;color:var(--muted)">Score ${d.score||0}/100</div>
    <div class="score-bar"><div class="score-fill" style="width:${Math.min(d.score||0,100)}%"></div></div>
    <div class="ed-meta">
      <span class="ed-price">${esc(price)}</span>
      ${d.age_years ? `<span>${d.age_years} ans</span>` : ''}
    </div>
    ${kw ? `<div style="font-size:10px;color:var(--muted)">🔑 ${esc(kw)}</div>` : ''}
    ${linked}
    <div class="card-actions">
      <button class="btn btn-sm" onclick="linkBoutique('${esc(d.id)}','${esc(d.niche)}','${esc(d.domain)}')">🔗 Lier</button>
      <button class="btn btn-sm" onclick="window.open('https://www.namecheap.com/domains/registration/results/?domain=${encodeURIComponent(d.domain)}','_blank')">🛒 Prix</button>
      <button class="btn btn-sm btn-danger" onclick="removeDomain('${esc(d.id)}')">✕</button>
    </div>
  </div>`;
}

window.removeDomain = async function(id) {
  if (!confirm('Retirer ce domaine ?')) return;
  try {
    await apiDelete('/expired-domains/'+id);
    _all = _all.filter(d => d.id !== id);
    renderOverview(); applyFilters();
    toast('Domaine retiré', 'success');
  } catch(e) { toast(e.message, 'error'); }
};

window.linkBoutique = async function(domainId, niche, domainName) {
  _pending = { id: domainId, domain: domainName };
  document.getElementById('link-domain-label').textContent = domainName + ' → ' + niche;
  try {
    const res = await apiGet('/boutiques', { per: 300, niche });
    const list = res.list || [];
    document.getElementById('boutique-select').innerHTML = list.length
      ? list.map(b=>`<option value="${esc(b.id)}">${esc(b.domain)}</option>`).join('')
      : '<option disabled>Aucune boutique pour cette niche</option>';
    openModal('modal-link');
  } catch(e) { toast(e.message, 'error'); }
};

window.confirmLink = async function() {
  const sel = document.getElementById('boutique-select');
  if (!sel?.value) return;
  try {
    await apiPut('/boutiques/'+sel.value, { expired_domain: _pending.domain });
    closeModal('modal-link');
    toast('Boutique liée !', 'success');
    await load();
  } catch(e) { toast(e.message, 'error'); }
};

load();
</script>
</body>
</html>
