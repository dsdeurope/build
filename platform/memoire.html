<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>V35 Build — Pour mémoire</title>
<link rel="stylesheet" href="/assets/platform.css">
</head>
<body>
<div id="toasts"></div>
<div class="layout">
  <aside id="sidebar"></aside>
  <div class="main">
    <header class="topbar">
      <span id="topbar-title">Pour mémoire</span>
      <div class="topbar-right">
        <input type="search" id="q-global" placeholder="Rechercher…" class="filter-input" oninput="filterAll()" style="min-width:200px">
      </div>
    </header>
    <div class="content">

      <!-- Tabs -->
      <div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap">
        <button class="tab-btn active" onclick="switchTab('prompts',this)">📝 Prompts</button>
        <button class="tab-btn" onclick="switchTab('jules',this)">🛒 Jules_dur (167)</button>
        <button class="tab-btn" onclick="switchTab('footprints',this)">🔍 Footprints</button>
      </div>

      <!-- ═══════════════════════════════ PROMPTS ═══════════════════════════ -->
      <div id="tab-prompts" class="tab-panel">

        <div class="section-group">
          <div class="section-group-title">🛍 CRO Produit</div>
          <div class="cards-grid" id="grid-cro"></div>
        </div>

        <div class="section-group">
          <div class="section-group-title">📦 SEO Bulk</div>
          <div class="cards-grid" id="grid-seo"></div>
        </div>

        <div class="section-group">
          <div class="section-group-title">🏠 Page Homepage</div>
          <div class="cards-grid" id="grid-homepage"></div>
        </div>

      </div>

      <!-- ═══════════════════════════════ JULES ════════════════════════════ -->
      <div id="tab-jules" class="tab-panel" style="display:none">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
          <span class="badge badge-info">167 boutiques @jules_dur</span>
          <input type="search" id="q-jules" placeholder="Filtrer domaines…" class="filter-input" oninput="filterJules()" style="max-width:260px">
          <button class="btn btn-sm" onclick="copyJules()">Copier tous</button>
        </div>
        <div id="jules-grid" class="domains-grid"></div>
      </div>

      <!-- ═══════════════════════════════ FOOTPRINTS ═══════════════════════ -->
      <div id="tab-footprints" class="tab-panel" style="display:none">
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <span class="badge badge-info">50+ signatures techniques</span>
          <button class="btn btn-sm" onclick="copyDorks()">Copier tous les dorks</button>
        </div>
        <div id="footprints-grid"></div>
      </div>

    </div>
  </div>
</div>

<style>
.tab-btn{padding:8px 16px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-size:13px;font-weight:500;transition:.15s;margin-bottom:-1px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:#6366f1;border-bottom-color:#6366f1}

.section-group{margin-bottom:28px}
.section-group-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}

.prompt-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:.15s}
.prompt-card:hover{border-color:#6366f1;box-shadow:0 0 0 1px #6366f144}
.prompt-card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.prompt-card-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.prompt-card-body{padding:12px 14px;font-size:11px;color:var(--muted);line-height:1.5;max-height:80px;overflow:hidden;text-overflow:ellipsis;white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
.prompt-card-footer{padding:8px 14px;display:flex;gap:6px;border-top:1px solid var(--border);background:var(--surface2)}

.domains-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.domain-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:12px;gap:6px}
.domain-item:hover{border-color:#6366f1}
.domain-link{color:var(--text);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.domain-link:hover{color:#6366f1}

.fp-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.fp-section-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fp-rows{padding:8px 14px;display:flex;flex-wrap:wrap;gap:6px}
.fp-item{display:flex;align-items:center;gap:6px;padding:4px 8px;background:var(--surface2);border-radius:5px;font-size:11px;cursor:pointer}
.fp-item:hover{background:rgba(99,102,241,.15)}
.fp-pct{font-size:10px;color:var(--muted)}
.fp-name{font-weight:600}

/* Modal */
.prompt-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.prompt-modal.open{display:flex}
.prompt-modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:760px;overflow:hidden}
.prompt-modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface2);border-bottom:1px solid var(--border)}
.prompt-modal-title{font-size:14px;font-weight:700}
.prompt-modal-body{padding:0}
.prompt-textarea{width:100%;min-height:460px;max-height:70vh;font-family:monospace;font-size:12px;line-height:1.6;border:none;background:var(--bg);color:var(--text);padding:16px;resize:vertical;outline:none;box-sizing:border-box}
.prompt-modal-footer{padding:12px 18px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);background:var(--surface2)}
</style>

<!-- Prompt viewer modal -->
<div class="prompt-modal" id="pm" onclick="if(event.target===this)closePM()">
  <div class="prompt-modal-box" onclick="event.stopPropagation()">
    <div class="prompt-modal-header">
      <span class="prompt-modal-title" id="pm-title">—</span>
      <button class="modal-close" onclick="closePM()">✕</button>
    </div>
    <div class="prompt-modal-body">
      <textarea class="prompt-textarea" id="pm-text" spellcheck="false"></textarea>
    </div>
    <div class="prompt-modal-footer">
      <button class="btn btn-sm" onclick="closePM()">Fermer</button>
      <button class="btn btn-primary" onclick="copyPM()">Copier le prompt</button>
    </div>
  </div>
</div>

5. Aucun LLM-isme : pas de "plonger dans", "en conclusion", "il est crucial"

STRUCTURE PILIER :
- H1 : mot-clé principal (intention informationnelle)
- Introduction 150-200 mots sans "bienvenue"
- 5-8 sections H2 avec H3
- FAQ 5 questions (schema.org)
- Conclusion + CTA interne

OUTPUT : Article Markdown complet, puis JSON avec meta + plan clusters

Niche : [NICHE]

Pays : France
Langue : Français`

// ── RENDER PROMPTS ────────────────────────────────────────────────────────────

function promptCard(p) {
  return `<div class="prompt-card" data-search="${p.title.toLowerCase()} ${p.desc.toLowerCase()}">
    <div class="prompt-card-header">
      <div class="prompt-card-title"><span>${p.icon}</span> ${p.title}</div>
    </div>
    <div class="prompt-card-body">${esc(p.desc)}</div>
    <div class="prompt-card-footer">
      <button class="btn btn-sm" onclick="openPM(${JSON.stringify(p.title)}, ${JSON.stringify(p.prompt)})">Voir</button>
      <button class="btn btn-primary btn-sm" onclick="copyPrompt(${JSON.stringify(p.prompt)})">Copier</button>
    </div>
  </div>`;
}

document.getElementById('grid-cro').innerHTML = PROMPTS_CRO.map(promptCard).join('');
document.getElementById('grid-seo').innerHTML = PROMPTS_SEO.map(promptCard).join('');

// ── JULES ─────────────────────────────────────────────────────────────────────

function renderJules(list) {
  document.getElementById('jules-grid').innerHTML = list.map((d,i) => `
    <div class="domain-item">
      <span style="font-size:10px;color:var(--muted);min-width:24px">${i+1}</span>
      <a href="https://${d}" target="_blank" class="domain-link">${d}</a>
      <button class="btn btn-xs" onclick="nav.clipboard.writeText('${d}');toast('Copié','success')" title="Copier">⎘</button>
    </div>
  `).join('');
}
renderJules(JULES_DOMAINS);

window.filterJules = function() {
  const q = document.getElementById('q-jules').value.toLowerCase();
  const filtered = JULES_DOMAINS.filter(d => d.includes(q));
  renderJules(filtered);
};

window.copyJules = function() {
  navigator.clipboard.writeText(JULES_DOMAINS.join('\n'));
  toast(`167 domaines copiés`, 'success');
};

// ── FOOTPRINTS ────────────────────────────────────────────────────────────────

function renderFootprints() {
  const html = Object.entries(FOOTPRINTS).map(([cat, items]) => `
    <div class="fp-section">
      <div class="fp-section-header">
        <span>${cat}</span>
        <span class="badge badge-info">${items.length} signatures</span>
      </div>
      <div class="fp-rows">
        ${items.map(item => `
          <div class="fp-item" onclick="copyDork(${JSON.stringify(item.dork)})" title="Cliquer pour copier le dork">
            <span class="fp-name">${item.name}</span>
            ${item.pct !== null ? `<span class="fp-pct">${item.pct}%</span>` : ''}
            <span style="font-size:9px;color:#6366f1">dork</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  document.getElementById('footprints-grid').innerHTML = html;
}
renderFootprints();

window.copyDork = function(dork) {
  navigator.clipboard.writeText(dork);
  toast('Dork copié !', 'success');
};

window.copyDorks = function() {
  const all = Object.values(FOOTPRINTS).flat().map(f => f.dork).join('\n');
  navigator.clipboard.writeText(all);
  toast('Tous les dorks copiés', 'success');
};

// ── TABS ──────────────────────────────────────────────────────────────────────

window.switchTab = function(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).style.display = '';
  btn.classList.add('active');
};

// ── MODAL ─────────────────────────────────────────────────────────────────────

window.openPM = function(title, prompt) {
  document.getElementById('pm-title').textContent = title;
  document.getElementById('pm-text').value = prompt;
  document.getElementById('pm').classList.add('open');
};
window.closePM = function() { document.getElementById('pm').classList.remove('open'); };
window.copyPM = function() {
  navigator.clipboard.writeText(document.getElementById('pm-text').value);
  toast('Prompt copié !', 'success');
};
window.copyPrompt = function(prompt) {
  navigator.clipboard.writeText(prompt);
  toast('Prompt copié !', 'success');
};

// ── GLOBAL FILTER ─────────────────────────────────────────────────────────────
window.filterAll = function() {
  const q = document.getElementById('q-global').value.toLowerCase();
  document.querySelectorAll('.prompt-card').forEach(card => {
    card.style.display = card.dataset.search.includes(q) ? '' : 'none';
  });
};

function esc(s) { const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
</script>
