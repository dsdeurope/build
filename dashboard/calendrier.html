<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V35 — Calendrier Backlinks</title>
  <style>
    :root{--bg:#0d0d0d;--surface:#111520;--border:#1e2535;--green:#00ff88;--yellow:#ffd700;--orange:#ff8c00;--red:#ff4444;--blue:#4488ff;--text:#e2e8f0;--muted:#64748b;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;}
    header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:1rem;padding:.8rem 2rem;background:rgba(13,13,13,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);}
    .logo{font-weight:700;color:var(--text);}.logo span{color:var(--orange);}
    nav a{color:var(--muted);text-decoration:none;font-size:.85rem;margin-left:1.5rem;transition:color .2s;}
    nav a:hover,nav a.active{color:var(--text);}
    .btn{padding:.4rem 1rem;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;transition:opacity .2s;}.btn:hover{opacity:.85;}
    .btn-orange{background:var(--orange);color:#000;}
    .btn-muted{background:var(--surface);border:1px solid var(--border);color:var(--muted);margin-left:auto;}

    .stats{display:flex;gap:0;border-bottom:1px solid var(--border);}
    .stat{flex:1;padding:.8rem 1.5rem;border-right:1px solid var(--border);text-align:center;}
    .stat:last-child{border-right:none;}
    .stat-n{font-size:1.5rem;font-weight:700;}
    .stat-l{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

    .week-wrap{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);margin:1.5rem 2rem;border-radius:10px;overflow:hidden;}
    .day-col{background:var(--surface);padding:.8rem .6rem;min-height:80px;}
    .day-col.today{background:#111a2a;border:1px solid rgba(255,140,0,.35);}
    .day-col.weekend{opacity:.45;}
    .day-name{font-size:.63rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:2px;}
    .day-date{font-size:.82rem;font-weight:700;margin-bottom:.5rem;}
    .day-col.today .day-date{color:var(--orange);}
    .day-spot{background:#0a0d14;border-radius:4px;padding:3px 5px;font-size:.62rem;margin-bottom:2px;display:flex;align-items:center;gap:3px;cursor:pointer;transition:opacity .15s;}
    .day-spot:hover{opacity:.75;}
    .day-spot.ok{opacity:.35;text-decoration:line-through;}
    .day-empty{font-size:.62rem;color:var(--muted);font-style:italic;}

    .velocity{display:flex;gap:.8rem;padding:.7rem 2rem;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
    .vel-label{font-size:.72rem;color:var(--muted);}
    .vel-bar-wrap{flex:1;min-width:160px;background:#0d0d0d;border-radius:4px;height:7px;overflow:hidden;}
    .vel-bar{height:100%;background:var(--orange);border-radius:4px;transition:width .5s;}
    .vel-pct{font-size:.72rem;color:var(--orange);font-weight:700;min-width:32px;}

    .toolbar{display:flex;align-items:center;gap:.8rem;padding:.8rem 2rem;border-bottom:1px solid var(--border);flex-wrap:wrap;}
    select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.35rem .7rem;border-radius:6px;font-size:.83rem;}
    .total-badge{margin-left:auto;font-size:.78rem;color:var(--muted);}

    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    thead th{padding:.55rem 1rem;text-align:left;font-size:.67rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);background:rgba(30,37,53,.5);border-bottom:1px solid var(--border);white-space:nowrap;}
    tbody td{padding:.58rem 1rem;border-bottom:1px solid #0f131a;vertical-align:middle;}
    tbody tr:hover td{background:#0a0d14;}
    tbody tr.row-ok td{opacity:.45;}
    .status-btn{padding:2px 10px;border-radius:10px;font-size:.68rem;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
    .s-attente{background:rgba(255,215,0,.12);color:var(--yellow);border:1px solid rgba(255,215,0,.3);}
    .s-ok{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.25);}
    .type-badge{padding:2px 7px;border-radius:6px;font-size:.65rem;font-weight:600;}
    .tb-blog{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.2);}
    .tb-forum{background:rgba(68,136,255,.1);color:var(--blue);border:1px solid rgba(68,136,255,.2);}
    .tb-wiki{background:rgba(168,85,247,.1);color:#a855f7;border:1px solid rgba(168,85,247,.2);}
    .tb-news{background:rgba(249,115,22,.1);color:#f97316;border:1px solid rgba(249,115,22,.2);}
    .m1-badge{display:inline-block;padding:1px 7px;border-radius:6px;font-size:.65rem;background:rgba(255,140,0,.12);color:var(--orange);border:1px solid rgba(255,140,0,.3);}
    .mn-badge{display:inline-block;padding:1px 7px;border-radius:6px;font-size:.65rem;background:var(--surface);border:1px solid var(--border);color:var(--muted);}
    .today-row td{background:rgba(255,140,0,.04)!important;}
  </style>
</head>
<body>
<header>
  <a href="/" class="logo">Zenith<span>lab</span></a>
  <nav>
    <a href="/">Dashboard</a><a href="/domaines.html">Domaines</a>
    <a href="/spots.html">Spots</a><a href="/audit-domaines.html">Audit</a>
    <a href="/calendrier.html" class="active">Calendrier</a>
  </nav>
  <button class="btn btn-orange" onclick="if(confirm('Réinitialiser ? Les statuts OK seront perdus.'))resetSchedule()">↺ Réinitialiser</button>
  <button class="btn btn-muted" onclick="exportCSV()">⬇ CSV</button>
</header>

<div class="stats">
  <div class="stat"><div class="stat-n" id="sTotal" style="color:var(--blue)">—</div><div class="stat-l">Total programmé</div></div>
  <div class="stat"><div class="stat-n" id="sOK" style="color:var(--green)">—</div><div class="stat-l">Soumis ✓</div></div>
  <div class="stat"><div class="stat-n" id="sWait" style="color:var(--yellow)">—</div><div class="stat-l">En attente</div></div>
  <div class="stat"><div class="stat-n" id="sWeek" style="color:var(--orange)">—</div><div class="stat-l">Cette semaine</div></div>
  <div class="stat"><div class="stat-n" id="sToday" style="color:var(--text)">—</div><div class="stat-l">Aujourd'hui</div></div>
</div>

<div id="weekWrap" class="week-wrap"></div>
<div class="velocity" id="velBar"></div>

<div class="toolbar">
  <select id="fStatus" onchange="render()"><option value="">Tous les statuts</option><option value="EN ATTENTE">En attente</option><option value="OK">Soumis</option></select>
  <select id="fCountry" onchange="render()"><option value="">Tous les pays</option></select>
  <select id="fMonth" onchange="render()"><option value="0">Tous les mois</option></select>
  <span class="total-badge" id="totalBadge">—</span>
</div>

<div class="table-wrap">
  <table>
    <thead><tr><th>Date programmée</th><th>Mois</th><th>Pays</th><th>Type</th><th>Statut</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
if(sessionStorage.getItem('v35_auth')!=='c0e1ef644e74252419e56e7818885cbeaf7bd35bec04b0dfda954678e4f16354')location.replace('/login.html?r='+encodeURIComponent(location.pathname));

const COUNTRIES=[
  {code:'FR',name:'France',flag:'🇫🇷'},{code:'DE',name:'Allemagne',flag:'🇩🇪'},
  {code:'ES',name:'Espagne',flag:'🇪🇸'},{code:'IT',name:'Italie',flag:'🇮🇹'},
  {code:'PT',name:'Portugal',flag:'🇵🇹'},{code:'NL',name:'Pays-Bas',flag:'🇳🇱'},
  {code:'BE',name:'Belgique',flag:'🇧🇪'},{code:'CH',name:'Suisse',flag:'🇨🇭'},
  {code:'AT',name:'Autriche',flag:'🇦🇹'},{code:'PL',name:'Pologne',flag:'🇵🇱'},
  {code:'SE',name:'Suède',flag:'🇸🇪'},{code:'DK',name:'Danemark',flag:'🇩🇰'},
  {code:'NO',name:'Norvège',flag:'🇳🇴'},{code:'FI',name:'Finlande',flag:'🇫🇮'},
  {code:'RO',name:'Roumanie',flag:'🇷🇴'},{code:'CZ',name:'Tchéquie',flag:'🇨🇿'},
  {code:'HU',name:'Hongrie',flag:'🇭🇺'},{code:'GR',name:'Grèce',flag:'🇬🇷'},
  {code:'GB',name:'UK',flag:'🇬🇧'},{code:'US',name:'USA',flag:'🇺🇸'},
];
const TYPES=['blog','forum','wiki','news','blog','forum'];
const KEY='bl_schedule';
let schedule=[];

function generateSchedule(){
  const spots=[],cur=new Date();cur.setHours(0,0,0,0);
  let id=0;
  // Month 1: 5 spots/weekday = 150 spots (~30 weekdays)
  let m1=0;
  while(m1<150){
    const dow=cur.getDay();
    if(dow!==0&&dow!==6){
      for(let i=0;i<5&&m1<150;i++){
        const c=COUNTRIES[id%20],t=TYPES[id%TYPES.length];
        spots.push({id:++id,date:cur.toISOString().slice(0,10),country:c.code,flag:c.flag,name:c.name,type:t,status:'EN ATTENTE',month:1});
        m1++;
      }
    }
    cur.setDate(cur.getDate()+1);
  }
  // Month 2+: Mon/Wed/Fri, 12/month +10% each month
  let monthly=12;
  for(let m=2;m<=12;m++){
    let ms=0;
    while(ms<monthly){
      const dow=cur.getDay();
      if([1,3,5].includes(dow)){
        const c=COUNTRIES[id%20],t=TYPES[id%TYPES.length];
        spots.push({id:++id,date:cur.toISOString().slice(0,10),country:c.code,flag:c.flag,name:c.name,type:t,status:'EN ATTENTE',month:m});
        ms++;
      }
      cur.setDate(cur.getDate()+1);
    }
    monthly=Math.round(monthly*1.1);
  }
  return spots;
}

function load(){
  const saved=JSON.parse(localStorage.getItem(KEY)||'null');
  schedule=saved?.spots||generateSchedule();
  populateFilters();
  render();
}
function save(){localStorage.setItem(KEY,JSON.stringify({spots:schedule}));}
function resetSchedule(){localStorage.removeItem(KEY);load();}
function toggle(id){const s=schedule.find(x=>x.id===id);if(s){s.status=s.status==='OK'?'EN ATTENTE':'OK';save();render();}}

function populateFilters(){
  const cs=document.getElementById('fCountry'),ms=document.getElementById('fMonth');
  COUNTRIES.forEach(c=>{const o=document.createElement('option');o.value=c.code;o.textContent=c.flag+' '+c.name;cs.appendChild(o);});
  [...new Set(schedule.map(s=>s.month))].sort((a,b)=>a-b).forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent='Mois '+m+(m===1?' — Lancement':'');ms.appendChild(o);});
}

function weekDates(){
  const t=new Date();t.setHours(0,0,0,0);
  const dow=t.getDay(),mon=new Date(t);mon.setDate(t.getDate()-(dow===0?6:dow-1));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

function renderWeek(){
  const days=weekDates(),todayStr=new Date().toISOString().slice(0,10);
  const DNAME=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  document.getElementById('weekWrap').innerHTML=days.map((d,i)=>{
    const ds=d.toISOString().slice(0,10),isToday=ds===todayStr,isWE=i>=5;
    const sp=schedule.filter(s=>s.date===ds);
    return`<div class="day-col${isToday?' today':''}${isWE?' weekend':''}">
      <div class="day-name">${DNAME[i]}</div>
      <div class="day-date">${d.getDate()}/${d.getMonth()+1}</div>
      ${sp.length?sp.map(s=>`<div class="day-spot${s.status==='OK'?' ok':''}" onclick="toggle(${s.id})" title="${s.name} — cliquer pour basculer">${s.flag} <span>${s.type}</span></div>`).join(''):'<div class="day-empty">—</div>'}
    </div>`;
  }).join('');
}

function renderVelocity(){
  const m1=schedule.filter(s=>s.month===1),done=m1.filter(s=>s.status==='OK').length;
  const pct=m1.length?Math.round(done/m1.length*100):0;
  const wds=weekDates().map(d=>d.toISOString().slice(0,10));
  const wk=schedule.filter(s=>wds.includes(s.date)),wkDone=wk.filter(s=>s.status==='OK').length;
  document.getElementById('velBar').innerHTML=`
    <span class="vel-label">🚀 Mois 1 — ${done}/${m1.length} spots soumis</span>
    <div class="vel-bar-wrap"><div class="vel-bar" style="width:${pct}%"></div></div>
    <span class="vel-pct">${pct}%</span>
    <span class="vel-label" style="margin-left:1.5rem">📅 Cette semaine : <strong style="color:var(--text)">${wkDone}/${wk.length}</strong> soumis</span>
    <span class="vel-label" style="margin-left:1rem">Vélocité M2+ : 3/sem → +10%/mois</span>`;
}

function render(){
  renderWeek();
  renderVelocity();
  const fS=document.getElementById('fStatus').value;
  const fC=document.getElementById('fCountry').value;
  const fM=+document.getElementById('fMonth').value;
  const todayStr=new Date().toISOString().slice(0,10);
  const wds=weekDates().map(d=>d.toISOString().slice(0,10));
  const filtered=schedule.filter(s=>{
    if(fS&&s.status!==fS)return false;
    if(fC&&s.country!==fC)return false;
    if(fM&&s.month!==fM)return false;
    return true;
  });
  document.getElementById('sTotal').textContent=schedule.length;
  document.getElementById('sOK').textContent=schedule.filter(s=>s.status==='OK').length;
  document.getElementById('sWait').textContent=schedule.filter(s=>s.status==='EN ATTENTE').length;
  document.getElementById('sWeek').textContent=schedule.filter(s=>wds.includes(s.date)).length;
  document.getElementById('sToday').textContent=schedule.filter(s=>s.date===todayStr).length;
  document.getElementById('totalBadge').textContent=`${filtered.length} résultat${filtered.length!==1?'s':''}`;
  const TC={blog:'tb-blog',forum:'tb-forum',wiki:'tb-wiki',news:'tb-news'};
  document.getElementById('tbody').innerHTML=filtered.map(s=>`<tr class="${s.status==='OK'?'row-ok':''}${s.date===todayStr?' today-row':''}">
    <td style="font-family:'Courier New',monospace;font-size:.78rem">${s.date}</td>
    <td><span class="${s.month===1?'m1-badge':'mn-badge'}">M${s.month}${s.month===1?' ★':''}</span></td>
    <td>${s.flag} ${s.name}</td>
    <td><span class="type-badge ${TC[s.type]||''}">${s.type}</span></td>
    <td><button class="status-btn ${s.status==='OK'?'s-ok':'s-attente'}" onclick="toggle(${s.id})">${s.status}</button></td>
  </tr>`).join('');
}

function exportCSV(){
  const rows=[['ID','Date','Mois','Pays','Type','Statut'],...schedule.map(s=>[s.id,s.date,s.month,s.name,s.type,s.status])];
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'})),download:'calendrier-backlinks.csv'});
  a.click();URL.revokeObjectURL(a.href);
}

load();
</script>
</body>
</html>
