<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V35 — Spots</title>
  <style>
    :root {
      --bg:#0d0d0d;--surface:#111520;--border:#1e2535;
      --green:#00ff88;--yellow:#ffd700;--orange:#ff8c00;
      --red:#ff4444;--blue:#4488ff;--text:#e2e8f0;--muted:#64748b;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;}

    header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:1rem;
      padding:.8rem 2rem;background:rgba(13,13,13,.9);backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);}
    .logo{font-weight:700;font-size:1rem;color:var(--text);}
    .logo span{color:var(--orange);}
    nav a{color:var(--muted);text-decoration:none;font-size:.85rem;margin-left:1.5rem;transition:color .2s;}
    nav a:hover,nav a.active{color:var(--text);}
    .btn{padding:.4rem 1rem;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;transition:opacity .2s;}
    .btn:hover{opacity:.85;}
    .btn-blue{background:var(--blue);color:#fff;margin-left:auto;}

    .toolbar{display:flex;align-items:center;gap:1rem;padding:.8rem 2rem;
      border-bottom:1px solid var(--border);flex-wrap:wrap;}
    select,input{background:var(--surface);border:1px solid var(--border);color:var(--text);
      padding:.35rem .7rem;border-radius:6px;font-size:.83rem;}
    input{width:220px;}
    .total-badge{margin-left:auto;font-size:.78rem;color:var(--muted);}

    /* Stats */
    .stats{display:flex;gap:0;border-bottom:1px solid var(--border);}
    .stat{flex:1;padding:.8rem 1.5rem;border-right:1px solid var(--border);text-align:center;}
    .stat:last-child{border-right:none;}
    .stat-n{font-size:1.5rem;font-weight:700;}
    .stat-l{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

    /* Table */
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    thead th{padding:.65rem 1.2rem;text-align:left;font-size:.7rem;text-transform:uppercase;
      letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border);
      white-space:nowrap;cursor:pointer;user-select:none;}
    thead th:hover{color:var(--text);}
    tbody td{padding:.7rem 1.2rem;border-bottom:1px solid #0f131a;vertical-align:middle;}
    tbody tr:hover td{background:#0a0d14;}

    /* Type badge */
    .type{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600;}
    .type-blog{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.2);}
    .type-forum{background:rgba(68,136,255,.1);color:var(--blue);border:1px solid rgba(68,136,255,.2);}
    .type-wiki{background:rgba(168,85,247,.1);color:#a855f7;border:1px solid rgba(168,85,247,.2);}
    .type-news{background:rgba(249,115,22,.1);color:#f97316;border:1px solid rgba(249,115,22,.2);}
    .type-other{background:rgba(100,116,139,.1);color:var(--muted);border:1px solid rgba(100,116,139,.2);}

    /* Friction badge */
    .friction{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.7rem;font-weight:600;}
    .f-libre{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.2);}
    .f-compte{background:rgba(255,215,0,.08);color:var(--yellow);border:1px solid rgba(255,215,0,.2);}
    .f-email{background:rgba(255,140,0,.1);color:var(--orange);border:1px solid rgba(255,140,0,.25);}

    /* DoFollow badge */
    .dofollow{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.7rem;font-weight:700;}
    .df-yes{background:rgba(0,255,136,.1);color:var(--green);}
    .df-no{background:rgba(100,116,139,.1);color:var(--muted);}

    .url-cell{max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .url-link{color:var(--blue);text-decoration:none;font-size:.82rem;}
    .url-link:hover{text-decoration:underline;}
    .anchor{color:var(--muted);font-size:.75rem;font-style:italic;}
    .domain-ref{font-size:.75rem;color:var(--muted);}

    .empty,.loading{text-align:center;padding:4rem 2rem;color:var(--muted);font-size:.9rem;}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);
      border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-right:.5rem;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">Zenith<span>lab</span></a>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/domaines.html">Domaines</a>
    <a href="/spots.html" class="active">Spots</a>
    <a href="/audit-domaines.html">Audit</a>
    <a href="/calendrier.html">Calendrier</a>
  </nav>
  <button class="btn btn-blue" onclick="load()">↻ Actualiser</button>
</header>

<div class="toolbar">
  <select id="typeFilter" onchange="applyFilters()">
    <option value="">Tous les types</option>
    <option value="blog">Blog</option>
    <option value="forum">Forum</option>
    <option value="wiki">Wiki</option>
    <option value="news">News</option>
  </select>
  <select id="frictionFilter" onchange="applyFilters()">
    <option value="">Toutes les frictions</option>
    <option value="libre">Libre</option>
    <option value="avec_compte">Avec compte</option>
    <option value="email_contact">Email contact</option>
  </select>
  <select id="dofollowFilter" onchange="applyFilters()">
    <option value="">DoFollow — tous</option>
    <option value="1">DoFollow seulement</option>
    <option value="0">NoFollow seulement</option>
  </select>
  <input type="text" id="searchInput" placeholder="Rechercher une URL ou domaine…" oninput="applyFilters()">
  <span class="total-badge" id="totalBadge">— résultats</span>
</div>

<div class="stats">
  <div class="stat"><div class="stat-n" id="sDofollow" style="color:var(--green)">—</div><div class="stat-l">DoFollow</div></div>
  <div class="stat"><div class="stat-n" id="sLibre" style="color:var(--green)">—</div><div class="stat-l">Libre (accès)</div></div>
  <div class="stat"><div class="stat-n" id="sBlog" style="color:var(--blue)">—</div><div class="stat-l">Blogs</div></div>
  <div class="stat"><div class="stat-n" id="sForum" style="color:var(--yellow)">—</div><div class="stat-l">Forums</div></div>
  <div class="stat"><div class="stat-n" id="sTotal" style="color:var(--text)">—</div><div class="stat-l">Total spots</div></div>
</div>

<!-- Calendrier Backlinks -->
<div style="margin:1rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.2rem .4rem;">
    <span style="font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)">📅 Calendrier Backlinks</span>
    <a href="/calendrier.html" style="font-size:.72rem;color:var(--green);text-decoration:none;font-weight:600;">Voir tout →</a>
  </div>
  <div style="display:grid;grid-template-columns:auto 1fr;gap:1rem;padding:.4rem 1.2rem .8rem;align-items:start">
    <div style="display:flex;gap:.6rem;flex-wrap:wrap" id="calCards"></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:6px;overflow:hidden;min-width:280px" id="calWeekSpots"></div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('url')">URL Spot ↕</th>
        <th onclick="sortBy('type')">Type ↕</th>
        <th onclick="sortBy('friction')">Friction ↕</th>
        <th onclick="sortBy('dofollow')">DoFollow ↕</th>
        <th onclick="sortBy('domain')">Domaine source ↕</th>
        <th onclick="sortBy('anchor')">Ancre ↕</th>
        <th onclick="sortBy('ts')">Découvert ↕</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="7" class="loading"><span class="spinner"></span>Chargement des spots…</td></tr>
    </tbody>
  </table>
</div>

<script>
const API = 'https://v35-dashboard-api.ernestpedanou.workers.dev/api/spots';
let all = [], filtered = [], sortKey = 'ts', sortAsc = false;

async function load() {
  try {
    const r = await fetch(API);
    const d = await r.json();
    all = d.spots || [];
    applyFilters();
  } catch {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="7" class="empty">Impossible de joindre l\'API — vérifiez la connexion.</td></tr>';
  }
}

function applyFilters() {
  const type = document.getElementById('typeFilter').value;
  const friction = document.getElementById('frictionFilter').value;
  const dofollow = document.getElementById('dofollowFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  filtered = all.filter(s => {
    if (type && s.type !== type) return false;
    if (friction && s.friction !== friction) return false;
    if (dofollow === '1' && !s.dofollow) return false;
    if (dofollow === '0' && s.dofollow) return false;
    if (search && !s.url?.toLowerCase().includes(search) && !s.domain?.toLowerCase().includes(search)) return false;
    return true;
  });
  renderStats();
  renderTable();
}

function renderStats() {
  document.getElementById('sTotal').textContent = all.length;
  document.getElementById('sDofollow').textContent = all.filter(s => s.dofollow).length;
  document.getElementById('sLibre').textContent = all.filter(s => s.friction === 'libre').length;
  document.getElementById('sBlog').textContent = all.filter(s => s.type === 'blog').length;
  document.getElementById('sForum').textContent = all.filter(s => s.type === 'forum').length;
  document.getElementById('totalBadge').textContent = `${filtered.length} résultat${filtered.length !== 1 ? 's' : ''}`;
}

function renderTable() {
  const sorted = [...filtered].sort((a, b) => {
    const va = a[sortKey] ?? '', vb = b[sortKey] ?? '';
    return sortAsc ? (va < vb ? -1 : va > vb ? 1 : 0) : (va > vb ? -1 : va < vb ? 1 : 0);
  });
  const tbody = document.getElementById('tbody');
  if (!sorted.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">Aucun spot trouvé.<br>Lancez le Backlink Hunter sur un domaine pour peupler cette liste.</td></tr>';
    return;
  }
  tbody.innerHTML = sorted.map(s => {
    const tc = typeClass(s.type);
    const fc = frictionClass(s.friction);
    const fl = frictionLabel(s.friction);
    const date = s.ts ? new Date(s.ts).toLocaleDateString('fr-FR') : '—';
    return `<tr>
      <td class="url-cell"><a href="${s.url}" target="_blank" class="url-link" title="${s.url}">${s.url}</a></td>
      <td><span class="type ${tc}">${typeLabel(s.type)}</span></td>
      <td><span class="friction ${fc}">${fl}</span></td>
      <td><span class="dofollow ${s.dofollow ? 'df-yes' : 'df-no'}">${s.dofollow ? 'O' : 'N'}</span></td>
      <td class="domain-ref">${s.domain || '—'}</td>
      <td class="anchor">${s.anchor ? s.anchor.slice(0, 40) : '—'}</td>
      <td style="color:var(--muted);font-size:.75rem">${date}</td>
    </tr>`;
  }).join('');
}

function sortBy(k) { if (sortKey === k) sortAsc = !sortAsc; else { sortKey = k; sortAsc = false; } renderTable(); }

function typeClass(t) {
  return {blog:'type-blog',forum:'type-forum',wiki:'type-wiki',news:'type-news'}[t] || 'type-other';
}
function typeLabel(t) {
  return {blog:'Blog',forum:'Forum',wiki:'Wiki',news:'News'}[t] || t || '—';
}
function frictionClass(f) {
  return {libre:'f-libre',avec_compte:'f-compte',email_contact:'f-email'}[f] || 'f-email';
}
function frictionLabel(f) {
  return {libre:'Libre',avec_compte:'Compte',email_contact:'Email'}[f] || f || '—';
}

function renderCalendar(){
  const sc=JSON.parse(localStorage.getItem('bl_schedule')||'null')?.spots;
  if(!sc){document.getElementById('calCards').innerHTML='<span style="font-size:.75rem;color:var(--muted)">Aucun calendrier — <a href="/calendrier.html" style="color:var(--green)">générer →</a></span>';return;}
  const todayStr=new Date().toISOString().slice(0,10);
  const today=new Date();today.setHours(0,0,0,0);
  const dow=today.getDay(),mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1));
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  const wStrs=days.map(d=>d.toISOString().slice(0,10));
  const ok=sc.filter(s=>s.status==='OK').length,wait=sc.filter(s=>s.status==='EN ATTENTE').length;
  const wkT=sc.filter(s=>wStrs.includes(s.date)).length,wkD=sc.filter(s=>wStrs.includes(s.date)&&s.status==='OK').length;
  const todN=sc.filter(s=>s.date===todayStr).length;
  document.getElementById('calCards').innerHTML=[
    [todN+' auj.','#ffd700'],[wkD+'/'+wkT+' sem.','#ff8c00'],[ok+' OK','#00ff88'],[wait+' en att.','#64748b'],
  ].map(([v,c])=>`<span style="padding:3px 10px;border-radius:8px;font-size:.72rem;font-weight:700;color:${c};background:${c}18;border:1px solid ${c}44">${v}</span>`).join('');
  const DNAME=['L','M','M','J','V','S','D'];
  document.getElementById('calWeekSpots').innerHTML=days.map((d,i)=>{
    const ds=d.toISOString().slice(0,10),isToday=ds===todayStr,isWE=i>=5;
    const sp=sc.filter(s=>s.date===ds),done=sp.filter(s=>s.status==='OK').length;
    return`<div style="background:${isToday?'#111a2a':'var(--surface)'};padding:.4rem .3rem;text-align:center;${isWE?'opacity:.4':''}">
      <div style="font-size:.58rem;color:${isToday?'#ff8c00':'var(--muted)'};text-transform:uppercase">${DNAME[i]}</div>
      <div style="font-size:.72rem;font-weight:700;color:${isToday?'#ff8c00':'var(--text)'}">${d.getDate()}</div>
      ${sp.length?`<div style="font-size:.6rem;color:${done===sp.length?'#00ff88':'#ffd700'};margin-top:1px">${done}/${sp.length}</div>`:'<div style="font-size:.6rem;color:#1e2535">·</div>'}
    </div>`;
  }).join('');
}

load();
renderCalendar();
setInterval(load, 60000);
</script>
</body>
</html>
