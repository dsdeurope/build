<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V35 — Domaines</title>
  <style>
    :root {
      --bg:#0d0d0d;--surface:#111520;--border:#1e2535;
      --green:#00ff88;--yellow:#ffd700;--orange:#ff8c00;
      --red:#ff4444;--blue:#4488ff;--text:#e2e8f0;--muted:#64748b;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;}

    header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:1rem;
      padding:.8rem 2rem;background:rgba(13,13,13,.9);backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);}
    .logo{font-weight:700;font-size:1rem;color:var(--text);}
    .logo span{color:var(--orange);}
    nav a{color:var(--muted);text-decoration:none;font-size:.85rem;margin-left:1.5rem;transition:color .2s;}
    nav a:hover,nav a.active{color:var(--text);}
    .btn{padding:.4rem 1rem;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;transition:opacity .2s;}
    .btn:hover{opacity:.85;}
    .btn-orange{background:var(--orange);color:#000;}
    .btn-blue{background:var(--blue);color:#fff;margin-left:auto;}

    .toolbar{display:flex;align-items:center;gap:1rem;padding:.8rem 2rem;
      border-bottom:1px solid var(--border);flex-wrap:wrap;}
    select,input{background:var(--surface);border:1px solid var(--border);color:var(--text);
      padding:.35rem .7rem;border-radius:6px;font-size:.83rem;}
    input{width:220px;}
    .total-badge{margin-left:auto;font-size:.78rem;color:var(--muted);}

    /* Stats */
    .stats{display:flex;gap:0;border-bottom:1px solid var(--border);}
    .stat{flex:1;padding:.8rem 1.5rem;border-right:1px solid var(--border);text-align:center;}
    .stat:last-child{border-right:none;}
    .stat-n{font-size:1.5rem;font-weight:700;}
    .stat-l{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

    /* Table */
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    thead th{padding:.65rem 1.2rem;text-align:left;font-size:.7rem;text-transform:uppercase;
      letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border);
      white-space:nowrap;cursor:pointer;user-select:none;}
    thead th:hover{color:var(--text);}
    tbody td{padding:.7rem 1.2rem;border-bottom:1px solid #0f131a;vertical-align:middle;}
    tbody tr:hover td{background:#0a0d14;}

    /* Diode */
    .diode{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
      border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap;}
    .diode::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .d-orange{background:rgba(255,140,0,.12);color:var(--orange);border:1px solid rgba(255,140,0,.4);}
    .d-orange::before{background:var(--orange);animation:blink 1s infinite;}
    .d-yellow{background:rgba(255,215,0,.1);color:var(--yellow);border:1px solid rgba(255,215,0,.3);}
    .d-yellow::before{background:var(--yellow);}
    .d-green{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.25);}
    .d-green::before{background:var(--green);}
    .d-red{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.3);}
    .d-red::before{background:var(--red);}
    .d-grey{background:rgba(100,116,139,.1);color:var(--muted);border:1px solid rgba(100,116,139,.2);}
    .d-grey::before{background:var(--muted);}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

    /* Status badge */
    .status{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.7rem;font-weight:600;}
    .s-clean{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.2);}
    .s-risque{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.25);}

    /* Niche tag */
    .niche{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600;
      background:rgba(68,136,255,.1);color:var(--blue);border:1px solid rgba(68,136,255,.2);}
    .niche.ecommerce{background:rgba(0,229,160,.08);color:#00e5a0;border-color:rgba(0,229,160,.2);}
    .niche.marketing_agency{background:rgba(168,85,247,.1);color:#a855f7;border-color:rgba(168,85,247,.2);}
    .niche.local_seo{background:rgba(249,115,22,.1);color:#f97316;border-color:rgba(249,115,22,.2);}

    .domain-link{color:var(--text);text-decoration:none;font-weight:600;}
    .domain-link:hover{color:var(--blue);}
    .date{color:var(--muted);font-size:.78rem;}
    .avail{font-size:.75rem;color:var(--muted);}

    .empty,.loading{text-align:center;padding:4rem 2rem;color:var(--muted);font-size:.9rem;}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);
      border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-right:.5rem;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">Zenith<span>lab</span></a>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/domaines.html" class="active">Domaines</a>
    <a href="/audit-domaines.html">Audit</a>
    <a href="/spots.html">Spots</a>
    <a href="/calendrier.html">Calendrier</a>
  </nav>
  <button class="btn btn-orange" onclick="triggerHunt()">🎯 Lancer la chasse</button>
  <button class="btn btn-blue" onclick="load()">↻ Actualiser</button>
</header>

<div class="toolbar">
  <select id="nicheFilter" onchange="applyFilters()">
    <option value="">Toutes les niches</option>
    <option value="seo_blog">SEO Blog</option>
    <option value="ecommerce">E-commerce</option>
    <option value="local_seo">Local SEO</option>
    <option value="marketing_agency">Agence Marketing</option>
  </select>
  <select id="diodeFilter" onchange="applyFilters()">
    <option value="">Toutes les diodes</option>
    <option value="orange">🟠 Alerte achat</option>
    <option value="yellow">🟡 À analyser</option>
    <option value="blue">🔵 Disponible</option>
    <option value="green">🟢 Actif</option>
    <option value="grey">⚫ Surveiller</option>
  </select>
  <select id="statusFilter" onchange="applyFilters()">
    <option value="">Tous les statuts</option>
    <option value="clean">Clean</option>
    <option value="risque">Risque</option>
  </select>
  <input type="text" id="searchInput" placeholder="Rechercher un domaine…" oninput="applyFilters()">
  <span class="total-badge" id="totalBadge">— résultats</span>
</div>

<div style="border-bottom:1px solid var(--border);">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:.55rem 2rem .3rem;">
    <span style="font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)">📅 Calendrier Backlinks</span>
    <a href="/calendrier.html" style="font-size:.72rem;color:var(--green);text-decoration:none;font-weight:600;">Voir tout →</a>
  </div>
  <div style="display:flex;gap:1rem;padding:.3rem 2rem .7rem;align-items:center;flex-wrap:wrap;">
    <div style="display:flex;gap:.5rem;flex-wrap:wrap" id="domCalCards"></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:6px;overflow:hidden;min-width:260px;margin-left:auto" id="domCalWeek"></div>
  </div>
</div>
<div class="stats" id="statsBar">
  <div class="stat"><div class="stat-n d-orange" id="sAlerte" style="color:var(--orange)">—</div><div class="stat-l">Alertes achat</div></div>
  <div class="stat"><div class="stat-n" id="sDisponible" style="color:var(--green)">—</div><div class="stat-l">Disponibles</div></div>
  <div class="stat"><div class="stat-n" id="sParked" style="color:var(--yellow)">—</div><div class="stat-l">Parkés / Expirés</div></div>
  <div class="stat"><div class="stat-n" id="sClean" style="color:var(--blue)">—</div><div class="stat-l">Clean</div></div>
  <div class="stat"><div class="stat-n" id="sTotal" style="color:var(--text)">—</div><div class="stat-l">Total</div></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('domain')">Domaine ↕</th>
        <th onclick="sortBy('niche')">Niche ↕</th>
        <th>Status</th>
        <th onclick="sortBy('ts')">Date découverte ↕</th>
        <th onclick="sortBy('diode.priority')">Diode achat ↕</th>
        <th onclick="sortBy('fpScore')">Footprint ↕</th>
        <th onclick="sortBy('totalScore')">Score ↕</th>
        <th onclick="sortBy('wayback.snapshots')">Wayback ↕</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="8" class="loading"><span class="spinner"></span>Chargement des données…</td></tr>
    </tbody>
  </table>
</div>

<script>
if(sessionStorage.getItem('v35_auth')!=='c0e1ef644e74252419e56e7818885cbeaf7bd35bec04b0dfda954678e4f16354')location.replace('/login.html?r='+encodeURIComponent(location.pathname));
const API = 'https://v35-domain-hunter.ernestpedanou.workers.dev';
let all = [], filtered = [], sortKey = 'diode.priority', sortAsc = true;

async function load() {
  try {
    const r = await fetch(`${API}?action=report`);
    const d = await r.json();
    all = d.opportunities || [];
    applyFilters();
  } catch {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="8" class="empty">Impossible de joindre l\'API — vérifiez la connexion.</td></tr>';
  }
}

async function triggerHunt() {
  const niche = document.getElementById('nicheFilter').value || 'seo_blog';
  document.getElementById('tbody').innerHTML = '<tr><td colspan="8" class="loading"><span class="spinner"></span>Chasse en cours…</td></tr>';
  try {
    const r = await fetch(`${API}?niche=${niche}`);
    const d = await r.json();
    all = d.opportunities || [];
    applyFilters();
  } catch {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="8" class="empty">Erreur lors de la chasse.</td></tr>';
  }
}

function applyFilters() {
  const niche = document.getElementById('nicheFilter').value;
  const diode = document.getElementById('diodeFilter').value;
  const status = document.getElementById('statusFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  filtered = all.filter(d => {
    if (niche && d.niche !== niche) return false;
    if (diode && d.diode?.color !== diode) return false;
    const st = getStatus(d);
    if (status === 'clean' && st !== 'clean') return false;
    if (status === 'risque' && st !== 'risque') return false;
    if (search && !d.domain.toLowerCase().includes(search)) return false;
    return true;
  });
  renderStats();
  renderTable();
}

function getStatus(d) {
  if (d.blacklisted) return 'risque';
  if (!d.wayback?.validated && d.availability !== 'actif') return 'risque';
  return 'clean';
}

function renderStats() {
  document.getElementById('sTotal').textContent = all.length;
  document.getElementById('sAlerte').textContent = all.filter(d => d.diode?.color === 'orange').length;
  document.getElementById('sDisponible').textContent = all.filter(d => d.availability === 'disponible').length;
  document.getElementById('sParked').textContent = all.filter(d => ['parké','expiré'].includes(d.availability)).length;
  document.getElementById('sClean').textContent = all.filter(d => getStatus(d) === 'clean').length;
  document.getElementById('totalBadge').textContent = `${filtered.length} résultat${filtered.length !== 1 ? 's' : ''}`;
}

function renderTable() {
  const sorted = [...filtered].sort((a, b) => {
    const va = nest(a, sortKey), vb = nest(b, sortKey);
    return sortAsc ? (va < vb ? -1 : va > vb ? 1 : 0) : (va > vb ? -1 : va < vb ? 1 : 0);
  });
  const tbody = document.getElementById('tbody');
  if (!sorted.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">Aucun domaine trouvé.<br>Analysez un leader sur /domaines puis lancez la chasse.</td></tr>';
    return;
  }
  tbody.innerHTML = sorted.map(d => {
    const dc = d.diode?.color || 'grey';
    const dv = d.diode?.verdict || '—';
    const st = getStatus(d);
    const wb = d.wayback || {};
    const date = d.ts ? new Date(d.ts).toLocaleDateString('fr-FR') : '—';
    return `<tr>
      <td><a href="https://${d.domain}" target="_blank" class="domain-link">${d.domain}</a></td>
      <td><span class="niche ${d.niche || ''}">${nicheLabel(d.niche)}</span></td>
      <td><span class="status s-${st}">${st === 'clean' ? '✓ Clean' : '⚠ Risque'}</span></td>
      <td><span class="date">${date}</span></td>
      <td><span class="diode d-${dc}">${dv}</span></td>
      <td><span style="color:${d.fpScore >= 70 ? 'var(--orange)' : d.fpScore >= 40 ? 'var(--yellow)' : 'var(--muted)'}">${d.fpScore || 0}%</span></td>
      <td>${d.totalScore || 0}/100</td>
      <td class="avail">${wb.validated ? `✓ ${wb.snapshots} snaps` : wb.snapshots ? `${wb.snapshots}` : '—'}</td>
    </tr>`;
  }).join('');
}

function sortBy(k) { if (sortKey === k) sortAsc = !sortAsc; else { sortKey = k; sortAsc = true; } renderTable(); }
function nest(o, p) { return p.split('.').reduce((x, k) => x?.[k], o) ?? ''; }
function nicheLabel(n) {
  return {seo_blog:'SEO Blog',ecommerce:'E-commerce',local_seo:'Local SEO',marketing_agency:'Marketing'}[n] || n || '—';
}

function renderDomCal(){
  const sc=JSON.parse(localStorage.getItem('bl_schedule')||'null')?.spots;
  if(!sc){document.getElementById('domCalCards').innerHTML='<span style="font-size:.75rem;color:var(--muted)">Aucun calendrier — <a href="/calendrier.html" style="color:var(--green)">générer →</a></span>';return;}
  const todayStr=new Date().toISOString().slice(0,10);
  const today=new Date();today.setHours(0,0,0,0);
  const dow=today.getDay(),mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1));
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  const wStrs=days.map(d=>d.toISOString().slice(0,10));
  const ok=sc.filter(s=>s.status==='OK').length,wait=sc.filter(s=>s.status==='EN ATTENTE').length;
  const wkT=sc.filter(s=>wStrs.includes(s.date)).length,wkD=sc.filter(s=>wStrs.includes(s.date)&&s.status==='OK').length;
  const todN=sc.filter(s=>s.date===todayStr).length;
  document.getElementById('domCalCards').innerHTML=[
    [todN+' auj.','#ffd700'],[wkD+'/'+wkT+' sem.','#ff8c00'],[ok+' OK','#00ff88'],[wait+' en att.','#64748b'],
  ].map(([v,c])=>`<span style="padding:3px 10px;border-radius:8px;font-size:.72rem;font-weight:700;color:${c};background:${c}18;border:1px solid ${c}44">${v}</span>`).join('');
  const DNAME=['L','M','M','J','V','S','D'];
  document.getElementById('domCalWeek').innerHTML=days.map((d,i)=>{
    const ds=d.toISOString().slice(0,10),isToday=ds===todayStr,isWE=i>=5;
    const sp=sc.filter(s=>s.date===ds),done=sp.filter(s=>s.status==='OK').length;
    return`<div style="background:${isToday?'#111a2a':'#111520'};padding:.4rem .3rem;text-align:center;${isWE?'opacity:.4':''}">
      <div style="font-size:.58rem;color:${isToday?'#ff8c00':'#64748b'};text-transform:uppercase">${DNAME[i]}</div>
      <div style="font-size:.72rem;font-weight:700;color:${isToday?'#ff8c00':'#e2e8f0'}">${d.getDate()}</div>
      ${sp.length?`<div style="font-size:.6rem;color:${done===sp.length?'#00ff88':'#ffd700'};margin-top:1px">${done}/${sp.length}</div>`:'<div style="font-size:.6rem;color:#1e2535">·</div>'}
    </div>`;
  }).join('');
}
load();
renderDomCal();
setInterval(load, 60000);
</script>
</body>
</html>
